services:
  - type: web
    name: penn-class-planner-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m penn_planner.data.seed_catalog
    startCommand: uvicorn penn_planner.api.app:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /api/v1/health
